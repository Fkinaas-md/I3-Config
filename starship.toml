add_newline = false
format = "$username$hostname$directory$git_branch$character"

[username]
# Мягкий лавандовый под цвет луча НЛО
style_user = "bold #cba6f7"
style_root = "bold #red"
format = "[$user]($style)"
show_always = true

[hostname]
ssh_only = false
# Серо-голубой под цвет корпуса тарелки
format = "[@$hostname]($style) "
style = "bold #89b4fa"

[directory]
# Приглушенный синий
style = "bold #7aa2f7"
format = "[$path]($style) "

[character]
# Фиолетовый акцент
success_symbol = "[➜](#cba6f7)"
error_symbol = "[➜](#f38ba8)"

[line_break]
disabled = true

