general {
    colors = true
    interval = 5
    color_good = "#7aa2f7"
    color_degraded = "#e0af68"
    color_bad = "#f7768e"
}

order += "cpu_usage"
order += "memory"
order += "battery all"
order += "tztime local"

cpu_usage {
    format = " cpu %usage "
}

memory {
    format = " mem %used "
    threshold_degraded = "1G"
}

battery all {
    format = " bat %percentage "
    last_full_capacity = true
}

tztime local {
       format = " %d %b %H:%M "
}

